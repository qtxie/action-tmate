name: macOS

on:
  workflow_dispatch:
    inputs:
      PACKAGE:
        description: ''
        required: false
        type: string

jobs:
  SSH-macOS:
    runs-on: macos-15

    steps:
    - name: Setup SSH Debug Session
      run: |
        # 1. Start the native macOS OpenSSH server
        # Stop existing background sessions to prevent conflicts
        sudo launchctl bootout system /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
        
        # Load and kickstart the service properly using the modern domain system
        sudo launchctl bootstrap system /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
        sudo launchctl kickstart -k system/com.openssh.sshd

        # 2. Inject your public key so Codex can authenticate cleanly 
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
        chmod 700 ~/.ssh && chmod 600 ~/.ssh/authorized_keys

        # 3. Setup private key for the VPS connection
        echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
        chmod 600 ~/.ssh/vps_key

        # 3. 创建专属 VNC 用户并直接通过系统配置启用屏幕共享
        # 创建一个名为 vncuser 的新管理员，密码为你的 secrets.VNC_PASSWORD
        sudo sysadminctl -addUser vncuser -fullName "VNC Debug User" -password "${{ secrets.VNC_PASSWORD }}" -admin
        
        # 激活远程管理基础服务
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -activate -configure -access -on -restart -agent -privs -all

        # 【核心修复】直接向 macOS 系统配置写入权限，强制允许所有本地用户通过 VNC（系统账户模式）登录
        sudo defaults write /Library/Preferences/com.apple.RemoteManagement.plist ScreenSharingAllowed -bool true
        sudo defaults write /Library/Preferences/com.apple.RemoteManagement.plist VNCLegacyConnectionsEnabled -bool false
        
        # 针对当前全新系统（macOS 14+），同时对屏幕共享服务写入允许
        sudo defaults write /Library/Preferences/com.apple.ScreenSharing.plist lines -array '{"authorizedPrincipalIdentifiers":[],"principalIdentifier":"group:ABCDEFAB-CDEF-ABCD-EFAB-CDEF00000050","type":"Principal"}' 2>/dev/null || true

        # 重启服务使配置生效
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart -restart -agent
        # 4. Create Reverse SSH Tunnel to your VPS
        # This maps port 2222 on your VPS to port 22 on the macOS runner
        ssh -i ~/.ssh/vps_key -N -f -R 2222:localhost:22 -R 5900:localhost:5900 \
          -p 15150 \
          -o StrictHostKeyChecking=no \
          -o ServerAliveInterval=20 \
          -o ServerAliveCountMax=3 \
          root@${{ secrets.VPS_IP }}

        echo "=== CONNECTION TARGET ==="
        echo "1. Terminal: ssh -p 2222 runner_user@${{ secrets.VPS_IP }}"
        echo "2. VNC Desktop: Open vnc://${{ secrets.VPS_IP }}:5900"
        echo "========================="

        # 5. Keep runner alive non-interactively while Codex debugs
        # Codex can run 'touch /tmp/keepalive' over SSH to terminate the job
        while [ ! -f /tmp/keepalive ]; do
          sleep 10
        done
