name: macOS

on: [push]

jobs:
  SSH-macOS:
    runs-on: macos-latest

    steps:
    - name: Setup SSH Debug Session
      run: |
        # 1. Start the native macOS OpenSSH server
        # Stop existing background sessions to prevent conflicts
        sudo launchctl bootout system /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
        
        # Load and kickstart the service properly using the modern domain system
        sudo launchctl bootstrap system /System/Library/LaunchDaemons/ssh.plist 2>/dev/null || true
        sudo launchctl kickstart -k system/com.openssh.sshd

        # 2. Inject your public key so Codex can authenticate cleanly 
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
        chmod 700 ~/.ssh && chmod 600 ~/.ssh/authorized_keys

        # 3. Create a raw, anonymous TCP reverse tunnel via Pinggy
        # This maps the runner's port 22 to a public address
        ssh -p 443 -R 0:localhost:22 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 a.pinggy.io > pinggy.log 2>&1 &
        ssh -p 443 -R 0:localhost:22 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 tcp@free.pinggy.io > pinggy.log 2>&1 &

        # 4. Wait for the tunnel to establish and print the connection target
        sleep 30
        echo "=== CODEX CONNECTION TARGET ==="
        if grep -q "tcp://" pinggy.log; then
          grep -oE 'tcp://[a-zA-Z0-9.-]+:[0-9]+' pinggy.log
        elif grep -q "Allocated port" pinggy.log; then
          echo "Connect using the allocated port found in logs:"
          grep -E "Allocated port|pinggy" pinggy.log
        else
          echo "Raw tunnel log output:"
          cat pinggy.log
        fi
        echo "================================="

        # 5. Keep runner alive non-interactively while Codex debugs
        # Codex can run 'touch /tmp/keepalive' over SSH to terminate the job
        while [ ! -f /tmp/keepalive ]; do
          sleep 10
        done
